version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: antondb
      POSTGRES_USER: anton
      POSTGRES_PASSWORD: anton_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anton"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Spring Boot API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/antondb
      SPRING_DATASOURCE_USERNAME: anton
      SPRING_DATASOURCE_PASSWORD: anton_secret
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      REDIS_HOST: redis
      STORAGE_ROOT: /app/storage-data
      JWT_SECRET: change-me-in-production-256-bit-secret-key!!
      CORS_ORIGINS: "http://localhost:3000,http://localhost:80"
    volumes:
      - storage_data:/app/storage-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  storage_data:
