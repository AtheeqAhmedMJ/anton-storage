spring.application.name=anton-storage

# --- Database (H2 for local dev; swap datasource for PostgreSQL) ---
spring.datasource.url=jdbc:h2:file:./data/antondb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# --- Redis (optional; caching degrades gracefully if not running) ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# --- File Storage ---
storage.root-dir=${STORAGE_ROOT:./storage-data}
storage.chunk-size-bytes=5242880
storage.max-file-size=5368709120

# --- Multipart ---
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# --- JWT ---
jwt.secret=${JWT_SECRET:anton-storage-secret-key-change-in-production-min-256-bits}
jwt.expiration-ms=86400000

# --- CORS ---
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# --- Logging ---
logging.level.com.anton=INFO
